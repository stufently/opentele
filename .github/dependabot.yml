version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      patch-minor:
        update-types: [patch, minor]
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      patch-minor:
        update-types: [patch, minor]
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker"

  # The first `pip` block above already covers pyproject.toml. Dependabot
  # automatically picks up `requirements*.txt` files in the same directory,
  # so `requirements-docker.txt` (the hash-locked Docker runtime deps) is
  # tracked under the same block. There is intentionally no second pip
  # config block — GitHub docs disallow overlapping directories.
