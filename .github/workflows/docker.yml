name: Docker

# Builds and pushes the opentele-ng container image to GHCR.
#
# Trigger:
#   - push to main → tag `:main` + `:sha-<7>` (rolling dev image)
#   - push of `v<MAJ>.<MIN>.<PAT>(-suffix)?` tag → `:1.2.3`, `:1.2`, `:1`, `:latest`
#
# Image is multi-arch (linux/amd64 + linux/arm64) so it runs on Apple Silicon
# laptops and AWS Graviton hosts unchanged.
on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opentele-ng
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},prefix=,value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},prefix=,value=${{ github.ref_name }}
            type=semver,pattern={{major}},prefix=,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/opentele-ng
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
