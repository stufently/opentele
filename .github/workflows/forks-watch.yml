name: Forks watch

# Once a month: scan public forks of thedemons/opentele for new commits,
# generate a Markdown report, open it as a GitHub Issue so it lands in the
# maintainer's notifications.
#
# Doesn't need any secrets — uses the default GITHUB_TOKEN which already has
# `issues: write` on the repository it runs from.
on:
  schedule:
    # 12:00 UTC on the 1st of every month.
    - cron: "0 12 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate report
        id: report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fork_watch.py > /tmp/forks-report.md
          echo "Report size: $(wc -l < /tmp/forks-report.md) lines"
          cat /tmp/forks-report.md

      - name: Open issue with report
        if: steps.report.outputs.has_activity == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/forks-report.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            // Ensure label exists (idempotent — ignore "already exists" error).
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'forks-watch',
                color: 'fbca04',
                description: 'Monthly upstream fork activity report',
              });
            } catch (err) {
              if (err.status !== 422) throw err;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Forks watch — ${today}`,
              body: body,
              labels: ['forks-watch'],
            });
