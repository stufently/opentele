name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: ubuntu-22.04
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Linux only — PyQt6 needs libgl/libglib)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 libglib2.0-0

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-test.txt

      - name: Run tests (excluding live tdata_test.py)
        # Coverage scope is the whole `opentele` package, not just `opentele.td`,
        # so gaps in CLI/tl/api also show up in the report. Gate is 80% (the
        # extra ~20 points slack accounts for `tl/telethon.py` QR-login paths
        # that need network and `api.py` device-fingerprint paths exercised by
        # a separate runtime test).
        run: pytest -v --tb=short --ignore=tests/tdata_test.py --cov=opentele --cov-report=term-missing --cov-fail-under=80 tests/

      - name: Wheel install smoke (catches package-data drift)
        # Editable install hides MANIFEST.in / package-data bugs. Build a real
        # wheel, install into a fresh venv, and import — this is what end
        # users actually do via `pip install opentele-ng`.
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --outdir /tmp/wheel
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install /tmp/wheel/opentele_ng-*.whl
          /tmp/smoke-venv/bin/python -c "
          import opentele, importlib.resources, sys
          # devices.json must ship as package data — otherwise device fingerprinting crashes at runtime.
          assert (importlib.resources.files('opentele') / 'devices.json').is_file(), 'devices.json not in wheel'
          assert (importlib.resources.files('opentele') / 'py.typed').is_file(), 'py.typed not in wheel'
          from opentele.api import API
          api = API.TelegramAndroid.Generate(unique_id='ci-smoke')
          assert api.device_model and api.system_version, 'device fingerprint generation broken'
          # USP holds end-to-end
          assert not any(m.startswith('PyQt') for m in sys.modules), 'Qt accidentally pulled in'
          print(f'OK opentele-ng {opentele.__version__} wheel install end-to-end')
          "
