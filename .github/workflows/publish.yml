name: Publish to PyPI

# Auto-publishes opentele-ng to PyPI when a tag matching `v*` is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no long-lived API token in the repo.
#
# Setup (one-time, in PyPI web UI):
#   https://pypi.org/manage/account/publishing/
#   → Add a pending publisher:
#       PyPI Project Name:  opentele-ng
#       Owner:              stufently
#       Repository name:    opentele
#       Workflow filename:  publish.yml
#       Environment name:   pypi
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches pyproject version
        run: |
          PY_VERSION=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          REF=${GITHUB_REF_NAME}
          # Strip leading 'v' and any '-suffix' so v1.2.3-polish matches 1.2.3
          TAG_VERSION=${REF#v}
          TAG_VERSION=${TAG_VERSION%%-*}
          echo "pyproject: $PY_VERSION   tag: $TAG_VERSION   ref: $REF"
          if [ "$PY_VERSION" != "$TAG_VERSION" ]; then
              echo "ERROR: pyproject version ($PY_VERSION) does not match tag ($TAG_VERSION)" >&2
              exit 1
          fi

      - name: Build
        run: python -m build

      - name: twine check
        run: python -m twine check dist/*

      - name: Show artifacts
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Upload to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/project/opentele-ng/
    permissions:
      id-token: write   # OIDC
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish (with PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
