name: Feature request
description: Suggest a feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case in concrete terms, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you imagine this working from a user's point of view?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered

  - type: checkboxes
    id: scope-check
    attributes:
      label: Scope check
      options:
        - label: "This does not require adding Qt / PyQt as a runtime dependency."
          required: true
        - label: "This is about opentele-ng (tdata ↔ Telethon), not Pyrogram bridges or general Telegram bot frameworks."
          required: true
