site_name: opentele-ng
site_description: Modern fork of opentele for Python 3.10–3.14, no Qt runtime dependency.
site_url: https://stufently.github.io/opentele/
repo_url: https://github.com/stufently/opentele
repo_name: stufently/opentele
edit_uri: edit/main/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Examples:
      - CLI quick start: examples/cli-quick-start.md
      - Docker: examples/docker.md
      - tdata → Telethon: examples/convert-tdata-to-telethon.md
      - Telethon → tdata: examples/convert-telethon-to-tdata.md
      - Batch conversion: examples/batch-convert.md
      - Official APIs: examples/using-official-apis.md
      - QR login: examples/qr-login.md

exclude_docs: |
  build/
  documentation/
  README.md
  google09fc260a1115c552.html

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
